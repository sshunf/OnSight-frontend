map $host $backend_origin {
  default https://onsight-backend.azurewebsites.net;
  ~*stage https://onsight-backend-stage.azurewebsites.net;
}

server {
  listen 80;
  server_name localhost;
  resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

  root /usr/share/nginx/html;
  index index.html;

  # Allow legacy pages (e.g., old wall QR links) that call same-origin /api/*
  # to reach the backend service in production.
  location /api/ {
    proxy_pass $backend_origin;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  # Keep member report page fresh so QR submissions always use latest endpoint logic.
  location = /member-report.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri =404;
  }

  location / {
    aio off;
    try_files $uri /index.html;
  }

  error_page 404 /index.html;
}
