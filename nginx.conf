server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Default to noindex for all routes; explicitly allow public pages below.
  add_header X-Robots-Tag "noindex, nofollow" always;

  # Allow legacy pages (e.g., old wall QR links) that call same-origin /api/*
  # to reach the backend service in production. The backend base comes from
  # BACKEND_PROXY_URL (injected from VITE_BACKEND_URL at image build/deploy).
  location /api/ {
    proxy_pass ${BACKEND_PROXY_URL};
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_ssl_name $proxy_host;
  }

  # Keep member report page fresh so QR submissions always use latest endpoint logic.
  location = /member-report.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri =404;
  }

  location / {
    aio off;
    add_header X-Robots-Tag "index, follow" always;
    try_files $uri /index.html;
  }

  # Public routes (allow indexing).
  location = /features { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /foundersNote { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /dashboard-demo { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /waitlist { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /documentation { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /faq { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /case-studies { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location ^~ /blog { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /garage { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /gym-select { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /roi { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /roi-calculator { add_header X-Robots-Tag "index, follow" always; try_files $uri /index.html; }
  location = /robots.txt { add_header X-Robots-Tag "index, follow" always; try_files $uri =404; }
  location = /sitemap.xml { add_header X-Robots-Tag "index, follow" always; try_files $uri =404; }

  error_page 404 /index.html;
}
